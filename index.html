<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro QR Hub</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:20px}
    .container{max-width:900px;margin:auto;background:#fff;padding:24px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{margin-top:0}
    label{display:block;margin:18px 0 8px;font-weight:700}
    select,button{width:100%;padding:14px;border:none;border-radius:12px;font-weight:700;font-size:16px}
    select{background:#eef3f8}
    button{background:#0b2a4a;color:#fff;cursor:pointer;margin-top:12px}
    #reader{margin-top:20px;min-height:260px}
    .status{margin-top:20px;padding:18px;border-radius:12px}
    .ok{background:#e8f7f1}
    .error{background:#fdecec}
    .warn{background:#fff4e5}
    .muted{color:#6b7280}
  </style>
</head>
<body>
  <div class="container">
    <h1>Registro QR</h1>

    <label for="hubSelect">Selecciona Hub</label>
    <select id="hubSelect">
      <option value="">Cargando hubs...</option>
    </select>

    <button id="btnConfirmHub">Confirmar hub</button>

    <p id="hubSelected">Hub no definido</p>

    <div id="reader"></div>

    <button id="btnStart">Iniciar escáner</button>
    <button id="btnStop">Detener escáner</button>

    <div id="status" class="status muted">Esperando acción...</div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPXCRbbJB3eC2DLP3QLEEDMDccMCFBTmB6ncMBbSnOgk5s4xnObefk2auRV8i50VQB/exec";

    let scanner = null;
    let hubSeleccionado = "";
    let isScanning = false;
    let isProcessing = false;

    const hubSelect = document.getElementById("hubSelect");
    const hubSelected = document.getElementById("hubSelected");
    const statusEl = document.getElementById("status");

    document.getElementById("btnConfirmHub").addEventListener("click", confirmHub);
    document.getElementById("btnStart").addEventListener("click", startScanner);
    document.getElementById("btnStop").addEventListener("click", stopScanner);

    function setStatus(type, msg) {
      statusEl.className = "status " + type;
      statusEl.textContent = msg;
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");

        window[callbackName] = function(data) {
          resolve(data);
          cleanup();
        };

        function cleanup() {
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.onerror = function() {
          cleanup();
          reject(new Error("No fue posible conectar con Apps Script."));
        };

        const separator = url.includes("?") ? "&" : "?";
        script.src = `${url}${separator}callback=${callbackName}`;

        document.body.appendChild(script);
      });
    }

    async function cargarHubs() {
      try {
        setStatus("warn", "Cargando hubs...");

        const data = await jsonp(`${APPS_SCRIPT_URL}?action=hubs`);

        if (!data.ok || !Array.isArray(data.hubs)) {
          throw new Error(data.message || "No llegaron hubs válidos.");
        }

        hubSelect.innerHTML = '<option value="">Selecciona un hub</option>';
        data.hubs.forEach(h => {
          const opt = document.createElement("option");
          opt.value = h;
          opt.textContent = h;
          hubSelect.appendChild(opt);
        });

        setStatus("ok", "Hubs cargados correctamente.");
      } catch (err) {
        console.error(err);
        setStatus("error", "Error cargando hubs: " + err.message);
      }
    }

    function confirmHub() {
      const value = hubSelect.value;
      if (!value) {
        setStatus("warn", "Debes seleccionar un hub.");
        return;
      }

      hubSeleccionado = value;
      hubSelected.textContent = "Hub: " + value;
      hubSelect.disabled = true;
      setStatus("ok", "Hub confirmado: " + value);
    }

    async function startScanner() {
      if (!hubSeleccionado) {
        setStatus("warn", "Selecciona y confirma un hub primero.");
        return;
      }

      if (isScanning) return;

      try {
        scanner = new Html5Qrcode("reader");
        const cameras = await Html5Qrcode.getCameras();

        if (!cameras.length) {
          setStatus("error", "No se detectaron cámaras.");
          return;
        }

        await scanner.start(
          cameras[0].id,
          { fps: 10, qrbox: 250 },
          onScanSuccess
        );

        isScanning = true;
        setStatus("ok", "Escáner iniciado.");
      } catch (err) {
        console.error(err);
        setStatus("error", "No fue posible iniciar cámara: " + (err.message || err));
      }
    }

    async function stopScanner() {
      try {
        if (scanner && isScanning) {
          await scanner.stop();
          await scanner.clear();
        }
      } catch (err) {
        console.error(err);
      } finally {
        scanner = null;
        isScanning = false;
        setStatus("warn", "Escáner detenido.");
      }
    }

    async function onScanSuccess(text) {
      if (isProcessing) return;
      isProcessing = true;

      try {
        await stopScanner();

        const url = new URL(text);
        const params = new URLSearchParams(url.search);

        const rut = (params.get("rut") || "").trim();
        const nombre = (params.get("nombre") || "").trim();
        const ruta = (params.get("ruta") || "").trim();

        if (!rut || !nombre || !ruta) {
          throw new Error("El QR no trae rut, nombre o ruta.");
        }

        setStatus("warn", "Procesando registro...");

        const qs = new URLSearchParams({
          action: "register",
          hub: hubSeleccionado,
          rut,
          nombre,
          ruta
        });

        const result = await jsonp(`${APPS_SCRIPT_URL}?${qs.toString()}`);

        setStatus(
          result.status === "success" ? "ok" :
          result.status === "duplicate" ? "warn" : "error",
          result.message || "Respuesta sin mensaje."
        );

      } catch (err) {
        console.error(err);
        setStatus("error", "Error procesando QR: " + err.message);
      } finally {
        setTimeout(() => { isProcessing = false; }, 1200);
      }
    }

    cargarHubs();
  </script>
</body>
</html>
